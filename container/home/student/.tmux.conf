# 社課 tmux 預設設定
set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
# 強制把 client 的 LANG 帶進 tmux server，避免每個 pane 是 non-UTF-8 模式
set -g update-environment "LANG LC_ALL LC_CTYPE TERM"
set -g base-index 1
setw -g pane-base-index 1

# 用 Ctrl-b | 跟 Ctrl-b - 來分割（比 % 跟 " 直觀）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Ctrl-b r 重新讀設定檔
bind r source-file ~/.tmux.conf \; display "tmux 設定已重新載入"

# Status bar
set -g status-style "bg=colour236 fg=colour255"
set -g status-left "#[bold] #S #[default] "
set -g status-right "#[fg=colour245]%H:%M %d-%b "
set -g status-left-length 30
setw -g window-status-current-style "bg=colour33 fg=colour255 bold"
