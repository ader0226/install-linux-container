services:
  lab:
    image: ghcr.io/ader0226/shell-attack-lab:latest
    build: .
    container_name: shell-lab
    hostname: lab
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./vpn:/vpn:ro
    ports:
      - "127.0.0.1:${PROXY_PORT:-1080}:1080"
    restart: unless-stopped
